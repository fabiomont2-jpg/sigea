{% extends "base.html" %}

{% block title %}Início{% endblock %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3 shadow-sm text-center">
    <div class="container-fluid py-5">
        <h1 class="display-5 fw-bold text-primary">SENAI</h1>
        <p class="col-md-12 fs-4">Sistema de Gerenciamento de Espaços Acadêmicos</p>
        <a href="{{ url_for('calendario') }}" class="btn btn-primary btn-lg px-5">Ver Calendário e Agendar</a>
    </div>
</div>

<div class="row mt-5">
    <h3 class="mb-4 text-center">Status dos Laboratórios (Hoje)</h3>
    {% for lab in labs %}
    <div class="col-md-3 mb-3">
        <div class="card h-100 shadow-sm border-0">
            <div class="card-body text-center">
                <h5 class="card-title fw-bold">{{ lab.nome }}</h5>
                <p class="card-text text-muted small">{{ lab.local }}</p>
                <div class="mt-3">
                    <span class="badge rounded-pill bg-success px-3 py-2">🟢 Livre</span>
                    <!-- Lógica real de status hoje seria implementada aqui -->
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
